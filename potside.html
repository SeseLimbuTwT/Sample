<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pot Shop</title>
  <link href="potside.css" rel="stylesheet">
  <link rel="stylesheet"href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <script src="potside.js"></script>
</head>
<body>
  <div class="nav">
    <h1 class="navitem" onclick="gohome()">Home</h1>
    <h1 class="navitem">Shop</h1>
    <h1 class="navitem">About</h1>
    <h1 class="navitem">Contact</h1>
  </div>
  <section class="section">
  <div class="itemcont">
    <div class="item"><a class="box">Russet</a> <button class="button">BUY ME</button></div>
    <div class="item"><a class="box">Red</a> <button class="button">BUY ME</button></div>
    <div class="item"><a class="box">Yellow</a> <button class="button">BUY ME</button></div>
    <div class="item"><a class="box">White</a> <button class="button">BUY ME</button></div>
    <div class="item"><a class="box">Fingerlings</a> <button class="button">BUY ME</button></div>
    <div class="item"><a class="box">Purple</a> <button class="button">BUY ME</button></div>
    <div class="item"><a class="box">Petite</a> <button class="button">BUY ME</button></div>
  </div>
  </section>
  <section id="contact" class="consection">
    <h2>Contact</h2>
    <p>Want to work together on future projects? Reach out to me!</p>
  <div class="social">
    <a href="https://discord.gg/MbbU3ehk6D" target="_blank" class="socbut"><i class="fab fa-discord"></i></a>
    <a href="https://github.com/SeseLimbuTwT" target="_blank" class="socbut"><i class="fab fa-github"></i></a>
    <a href="https://www.linkedin.com" target="_blank" class="socbut"><i class="fab fa-linkedin-in"></i></a>
    <a href="https://www.instagram.com" target="_blank" class="socbut"><i class="fab fa-instagram"></i></a>
  </div>
  <form class="form">
    <input type="text" name="name" placeholder="Your Name" required>
    <input type="text" name="email" placeholder="Your Email" required>
    <textarea name="message" placeholder="Your Message" rows="5" required></textarea>
    <button class="sub">Send</button>
  </form>
  </section>
</body>
</html>
